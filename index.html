<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Visual Novel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-bubble {
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px; height: 6px;
            background-color: #94a3b8;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="text-sm antialiased">

    <div id="login-screen" class="flex flex-col items-center justify-center h-full w-full p-6 absolute inset-0 z-[60] bg-slate-900 transition-opacity duration-500">
        <div class="max-w-md w-full bg-slate-800 rounded-2xl p-8 shadow-2xl border border-slate-700 text-center">
            <h1 class="text-2xl font-semibold text-white mb-2">Login</h1>
            <p class="text-slate-400 text-xs mb-8">Masuk untuk menyimpan dan memuat ceritamu.</p>
            <button id="login-btn" class="w-full bg-white text-slate-900 font-medium py-3 rounded-lg transition-colors shadow-lg flex items-center justify-center gap-2 hover:bg-slate-200">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/></svg>
                Login dengan Google
            </button>
        </div>
    </div>

    <div id="menu-screen" class="hidden flex-col items-center justify-center h-full w-full p-6 absolute inset-0 z-50 bg-slate-900 transition-opacity duration-500">
        <div class="max-w-md w-full bg-slate-800 rounded-2xl p-8 shadow-2xl border border-slate-700 relative">
            <button id="logout-btn" class="absolute top-4 right-4 text-xs text-red-400 hover:text-red-300">Logout</button>
            <h1 class="text-2xl font-semibold text-white mb-2 text-center">AI Visual Novel</h1>
            <p class="text-slate-400 text-xs text-center mb-6">Selamat datang, <span id="user-name">Pemain</span>!</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-300 mb-1">Nama Karakter Utama</label>
                    <input type="text" id="mc-name" placeholder="Misal: Raga" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-white">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-300 mb-1">Premis Cerita</label>
                    <textarea id="story-premise" rows="3" placeholder="Tuliskan awal mula ceritamu di sini..." class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-white resize-none"></textarea>
                </div>
                <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded-lg transition-colors shadow-lg shadow-blue-900/20 mb-2">
                    Mulai Cerita Baru
                </button>
                <div class="border-t border-slate-700 my-4"></div>
                <button id="view-history-btn" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-medium py-3 rounded-lg transition-colors">
                    Lihat Riwayat Cerita
                </button>
            </div>
        </div>
    </div>

    <div id="history-screen" class="hidden flex-col h-full w-full max-w-2xl mx-auto p-6 absolute inset-0 z-[55] bg-slate-900">
        <button id="back-to-menu-btn" class="text-slate-400 hover:text-white mb-6 text-left">&larr; Kembali ke Menu</button>
        <h2 class="text-2xl font-semibold text-white mb-4">Riwayat Ceritamu</h2>
        <div id="history-list" class="flex-1 overflow-y-auto space-y-3 pb-10">
            </div>
    </div>

    <div id="game-screen" class="hidden flex-col h-full w-full max-w-4xl mx-auto bg-slate-900 relative">
        <header class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900 z-10">
            <h2 id="header-title" class="font-medium text-slate-200 truncate">Cerita Berlangsung...</h2>
            <div class="flex gap-4">
                <button id="save-story-btn" class="text-xs text-blue-400 hover:text-blue-300 transition-colors">Simpan</button>
                <button onclick="location.reload()" class="text-xs text-slate-400 hover:text-white transition-colors">Keluar</button>
            </div>
        </header>

        <div id="story-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 pb-32">
            </div>

        <div class="absolute bottom-0 w-full glass-panel p-4 pb-safe">
            <div id="loading-indicator" class="hidden flex-col items-center justify-center py-4">
                <div class="typing-indicator mb-2">
                    <span></span><span></span><span></span>
                </div>
                <p class="text-xs text-slate-400">AI sedang memikirkan kelanjutan cerita...</p>
            </div>

            <div id="controls-container" class="hidden max-w-3xl mx-auto flex flex-col gap-3">
                <div id="ai-choices-container" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
                
                <div class="relative flex items-center mt-2">
                    <div class="flex-grow border-t border-slate-700"></div>
                    <span class="flex-shrink-0 mx-4 text-xs text-slate-500">ATAU TULIS SENDIRI</span>
                    <div class="flex-grow border-t border-slate-700"></div>
                </div>

                <div class="flex gap-2">
                    <input type="text" id="custom-choice-input" placeholder="Apa yang ingin kamu lakukan/katakan?" class="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 text-white transition-all">
                    <button id="send-custom-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-lg font-medium transition-colors">
                        Kirim
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
